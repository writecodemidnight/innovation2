# application-dev.yml - 开发环境配置 (PostgreSQL)
spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/campus_club
    username: campus_user
    password: dev_password_123
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true
    show-sql: true

  # Redis 暂时禁用（可选）
  # data:
  #   redis:
  #     host: localhost
  #     port: 6379
  #     password: dev_redis_password_456
  #     timeout: 5000ms
  #     lettuce:
  #       pool:
  #         max-active: 8
  #         max-idle: 8
  #         min-idle: 0
  #         max-wait: -1ms

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

jwt:
  secret: dev_jwt_secret_key_change_in_production_789
  expiration: 7200000 # 2小时
  refresh-expiration: 604800000 # 7天

# 算法服务配置
algorithm:
  service:
    url: http://localhost:8000
  timeout:
    seconds: 30
  retry:
    count: 3
  cache:
    ttl:
      standard: 600
      extended: 3600
      medium: 1800

logging:
  level:
    com.campusclub: DEBUG
