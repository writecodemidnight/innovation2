# application.yml
spring:
  application:
    name: campus-club-backend

  profiles:
    active: dev

  jackson:
    time-zone: Asia/Shanghai
    date-format: yyyy-MM-dd HH:mm:ss
    serialization:
      write-dates-as-timestamps: false

  # 数据源配置
  datasource:
    url: jdbc:postgresql://localhost:5432/campus_club
    username: postgres
    password: 123456
    driver-class-name: org.postgresql.Driver

  # JPA 配置
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
    show-sql: false

  # Flyway 配置
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    out-of-order: true
    validate-on-migrate: false

  # Redis 配置
  redis:
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD:}
    timeout: 2000ms
    lettuce:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 0

  # 文件上传配置
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB

server:
  port: 8082
  servlet:
    context-path: /api
    encoding:
      charset: UTF-8
      enabled: true
      force: true

# JWT 配置
jwt:
  secret: ${JWT_SECRET:your-secret-key-change-in-production-minimum-256-bits-for-hs256}
  access-token-expiration: 7200000  # 2小时
  refresh-token-expiration: 604800000  # 7天

# 微信小程序配置
wechat:
  mp:
    app-id: ${WECHAT_APP_ID:}
    secret: ${WECHAT_SECRET:}

# 算法服务配置
algorithm:
  service:
    url: ${ALGORITHM_SERVICE_URL:http://localhost:8000}
  timeout:
    seconds: 30
  retry:
    count: 3
  cache:
    ttl:
      standard: 600
      medium: 1800
      extended: 3600

logging:
  level:
    # 只显示业务代码的INFO级别日志
    com.campusclub: INFO
    # 完全关闭SQL和Spring冗余日志
    org.springframework.security: ERROR
    org.hibernate: ERROR
    org.hibernate.SQL: OFF
    org.hibernate.type.descriptor.sql: OFF
    org.springframework.web: ERROR
    org.springframework.data: ERROR
    org.apache.coyote: ERROR
    org.apache.catalina: ERROR

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always

# SpringDoc / OpenAPI 配置
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
  openapi:
    info:
      title: Campus Club API
      version: 1.0.0
      description: 校园社团活动评估系统API
