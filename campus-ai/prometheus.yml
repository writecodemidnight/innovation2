# campus-ai/prometheus.yml

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'ml-api'
    static_configs:
      - targets: ['ml-api:8000']
    metrics_path: /metrics

  - job_name: 'celery-workers'
    static_configs:
      - targets: ['worker-clustering:8000', 'worker-scheduling:8000']
