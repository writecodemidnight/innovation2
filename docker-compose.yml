  #     PYTHONPATH: /app
  #   ports:
  #     - "8000:8000"
  #   volumes:
  #     - ./campus-ai/src:/app/src:ro
  #   networks:
  #     - campus-network

volumes:
  postgres_data:
  redis_data:

networks:
  campus-network:
    driver: bridge